<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rishi's DevOps App</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-align: center;
        }
        .container {
            margin-top: 100px;
        }
        h1 {
            font-size: 3rem;
        }
        p {
            font-size: 1.2rem;
            opacity: 0.9;
        }
        .btn {
            margin-top: 20px;
            padding: 12px 25px;
            background: white;
            color: #333;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
        }
        .btn:hover {
            background: #f0f0f0;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 Welcome to My DevOps App</h1>
    <p>Built with Flask, Docker & CI/CD</p>

    <button class="btn" onclick="showMessage()">Click Me</button>
</div>

<script>
function showMessage() {
    alert("CI/CD is working perfectly 🔥");
}
</script>

</body>
</html>
